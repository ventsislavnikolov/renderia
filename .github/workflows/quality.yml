name: Quality
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Lint + Typecheck + Unit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install PNPM
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26.5.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ultracite check
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit
